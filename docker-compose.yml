version: "3.8"

services:

  web:
    build: .
    container_name: task_web

    ports:
      - "8080:80"

    volumes:
      - .:/var/www/html

    depends_on:
      - db

  db:
    image: mysql:8.0

    container_name: task_db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: task_mahasiswa

    ports:
      - "3307:3306"

    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql